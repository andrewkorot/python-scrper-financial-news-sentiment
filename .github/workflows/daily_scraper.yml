name: Daily Sentiment Scraper

on:
  schedule:
    - cron: '0 8 * * *'  # Every day at 8:00 AM UTC
  workflow_dispatch:      # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas textblob transformers torch

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push updated data
        run: |
          git config user.email 'actions@github.com'
          git config user.name 'GitHub Actions'
          git add financial_sentiment_data_v2.csv
          git diff --staged --quiet || git commit -m 'Auto update: daily sentiment scrape'
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
